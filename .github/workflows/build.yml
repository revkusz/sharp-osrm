name: Build Native Library

on:
  push:
    branches: [main]
    tags: ['v*.*.*']
  pull_request:
    branches: [main]

permissions:
  contents: read
  actions: read  # required to query workflow runs and download artifacts via API

jobs:
  # ── Check for existing artifacts ────────────────────────────────────────
  # Looks for a prior successful run on the same commit SHA. If all three
  # native artifacts exist, re-uploads them into this run and sets
  # artifacts_ready=true so the build matrix is skipped entirely.
  check-artifacts:
    name: Check Existing Artifacts
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    outputs:
      artifacts_ready: ${{ steps.check.outputs.artifacts_ready }}
    steps:
      - name: Find and reuse artifacts from prior run on this commit
        id: check
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          NEEDED="sharposrm-linux-x64 sharposrm-macos-arm64 sharposrm-win-x64"

          # Find the most recent successful run of this workflow on the same SHA,
          # excluding the current run itself.
          PRIOR_RUN_ID=$(gh api \
            "repos/${{ github.repository }}/actions/runs?head_sha=${{ github.sha }}&status=success&per_page=20" \
            --jq "[.workflow_runs[] | select(.id != ${{ github.run_id }}) | .id] | first // empty")

          if [ -z "$PRIOR_RUN_ID" ]; then
            echo "No prior successful run found for ${{ github.sha }} — will build from scratch."
            echo "artifacts_ready=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "Prior successful run: $PRIOR_RUN_ID"

          # Verify every required artifact is present in that run.
          AVAILABLE=$(gh api \
            "repos/${{ github.repository }}/actions/runs/$PRIOR_RUN_ID/artifacts" \
            --jq '[.artifacts[].name]')

          for name in $NEEDED; do
            if ! echo "$AVAILABLE" | grep -q "\"$name\""; then
              echo "Artifact '$name' missing from run $PRIOR_RUN_ID — will build from scratch."
              echo "artifacts_ready=false" >> "$GITHUB_OUTPUT"
              exit 0
            fi
          done

          echo "All artifacts found in run $PRIOR_RUN_ID — reusing."
          for name in $NEEDED; do
            gh run download "$PRIOR_RUN_ID" \
              --name "$name" \
              --dir "reused/$name" \
              --repo "${{ github.repository }}"
            echo "  Downloaded: $name"
          done
          echo "artifacts_ready=true" >> "$GITHUB_OUTPUT"

      - name: Re-upload linux-x64
        if: steps.check.outputs.artifacts_ready == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: sharposrm-linux-x64
          path: reused/sharposrm-linux-x64/
          retention-days: 7
          if-no-files-found: error

      - name: Re-upload macos-arm64
        if: steps.check.outputs.artifacts_ready == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: sharposrm-macos-arm64
          path: reused/sharposrm-macos-arm64/
          retention-days: 7
          if-no-files-found: error

      - name: Re-upload win-x64
        if: steps.check.outputs.artifacts_ready == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: sharposrm-win-x64
          path: reused/sharposrm-win-x64/
          retention-days: 7
          if-no-files-found: error

  # ── Native builds ────────────────────────────────────────────────────────
  # Only runs when check-artifacts did not find all artifacts for this SHA.
  build-native:
    name: Build (${{ matrix.platform.label }})
    needs: check-artifacts
    if: needs.check-artifacts.outputs.artifacts_ready != 'true'
    runs-on: ${{ matrix.platform.runner }}
    timeout-minutes: 90
    strategy:
      fail-fast: false
      matrix:
        platform:
          - runner: ubuntu-24.04
            label: linux-x64
            preset: linux-x64
            artifact: sharposrm-linux-x64
            lib_name: libsharposrm.so
            lib_path: build/linux-x64/libsharposrm.so
          - runner: macos-15
            label: macos-arm64
            preset: macos-arm64
            artifact: sharposrm-macos-arm64
            lib_name: libsharposrm.dylib
            lib_path: build/macos-arm64/libsharposrm.dylib
          - runner: windows-2025
            label: win-x64
            preset: win-x64
            artifact: sharposrm-win-x64
            lib_name: sharposrm.dll
            lib_path: build/win-x64/Release/sharposrm.dll

    steps:
      - name: Checkout with submodules
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Install Conan 2.x
        shell: bash
        run: |
          python3 -m venv .venv
          if [ "$RUNNER_OS" == "Windows" ]; then
            source .venv/Scripts/activate
            python3 -m pip install --upgrade pip conan
          else
            source .venv/bin/activate
            pip install --upgrade pip conan
          fi

      - name: Detect Conan profile
        shell: bash
        run: |
          if [ "$RUNNER_OS" == "Windows" ]; then
            source .venv/Scripts/activate
          else
            source .venv/bin/activate
          fi
          conan profile detect --force

      - name: Cache Conan packages
        uses: actions/cache@v4
        with:
          path: ~/.conan2
          key: conan-${{ matrix.platform.label }}-${{ hashFiles('conanfile.py') }}
          restore-keys: |
            conan-${{ matrix.platform.label }}-

      - name: Install build tools (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y ninja-build

      - name: Install build tools (macOS)
        if: runner.os == 'macOS'
        run: brew install ninja

      - name: Add Conan to PATH (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: echo "${{ github.workspace }}\.venv\Scripts" >> $env:GITHUB_PATH

      - name: Configure CMake
        shell: bash
        run: |
          if [ "$RUNNER_OS" == "Windows" ]; then
            source .venv/Scripts/activate
          else
            source .venv/bin/activate
          fi
          cmake --preset ${{ matrix.platform.preset }}

      - name: Build
        shell: bash
        run: |
          if [ "$RUNNER_OS" == "Windows" ]; then
            source .venv/Scripts/activate
            cmake --build --preset ${{ matrix.platform.preset }} --config Release
          else
            source .venv/bin/activate
            cmake --build --preset ${{ matrix.platform.preset }}
          fi

      - name: Verify build
        shell: bash
        run: bash scripts/verify-build.sh ${{ matrix.platform.lib_path }}

      - name: Collect runtime dependencies
        shell: bash
        run: |
          # Copy the main library and its Conan-built shared dependencies into
          # a single staging directory so they all land in runtimes/{rid}/native/
          # in the NuGet package. Without this, the integration test runner has
          # no Conan cache and DllNotFoundException fires on libtbb / libbz2.
          STAGING="staging/${{ matrix.platform.artifact }}"
          mkdir -p "$STAGING"

          LIB_PATH="${{ matrix.platform.lib_path }}"
          cp "$LIB_PATH" "$STAGING/"

          if [ "$RUNNER_OS" == "Linux" ]; then
            # Collect every non-system shared dependency (i.e. those resolved
            # from the Conan cache) by reading ldd output.
            ldd "$LIB_PATH" | awk '/\.conan2/{print $3}' | while read dep; do
              [ -f "$dep" ] && cp "$dep" "$STAGING/" && echo "Bundled: $(basename $dep)"
            done
          elif [ "$RUNNER_OS" == "macOS" ]; then
            # otool -L lists all dylib links; collect those living in ~/.conan2
            otool -L "$LIB_PATH" | awk '/\.conan2/{print $1}' | while read dep; do
              [ -f "$dep" ] && cp "$dep" "$STAGING/" && echo "Bundled: $(basename $dep)"
            done
            # Rewrite @rpath/* references to @loader_path/* so the dylibs find
            # each other regardless of install location.
            for dylib in "$STAGING"/*.dylib; do
              install_name_tool -add_rpath @loader_path "$dylib" 2>/dev/null || true
            done
          elif [ "$RUNNER_OS" == "Windows" ]; then
            # On Windows, Conan DLLs are in the Conan package bin/ dirs.
            # Find them by looking at the build directory for copied DLLs,
            # or search the Conan cache directly for known TBB/bzip2 DLLs.
            CONAN_HOME="${USERPROFILE}/.conan2"
            for dll in tbb12.dll tbbmalloc.dll tbbmalloc_proxy.dll bz2.dll; do
              found=$(find "$CONAN_HOME" -name "$dll" -type f 2>/dev/null | head -1)
              if [ -n "$found" ]; then
                cp "$found" "$STAGING/" && echo "Bundled: $dll"
              fi
            done
          fi

          echo "=== Staging contents ==="
          ls -lh "$STAGING/"

      - name: Upload native library
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.platform.artifact }}
          path: staging/${{ matrix.platform.artifact }}/
          retention-days: 7
          if-no-files-found: error

  # ── Collect ──────────────────────────────────────────────────────────────
  collect-artifacts:
    name: Collect Artifacts
    runs-on: ubuntu-24.04
    needs: [check-artifacts, build-native]
    # Run when check-artifacts succeeded AND build-native either succeeded or
    # was skipped (because check-artifacts already provided the artifacts).
    if: |
      always() &&
      needs.check-artifacts.result == 'success' &&
      (needs.build-native.result == 'success' || needs.build-native.result == 'skipped')
    timeout-minutes: 10
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: false

      - name: Verify all platform artifacts present
        shell: bash
        run: |
          echo "=== Downloaded artifacts ==="
          ls -R artifacts/
          echo ""

          missing=0
          for expected in sharposrm-linux-x64 sharposrm-macos-arm64 sharposrm-win-x64; do
            if [ -d "artifacts/$expected" ]; then
              echo "✅ Found: $expected"
            else
              echo "❌ Missing: $expected"
              missing=$((missing + 1))
            fi
          done

          if [ "$missing" -ne 0 ]; then
            echo ""
            echo "ERROR: $missing artifact(s) missing!"
            exit 1
          fi

          echo ""
          echo "All 3 platform artifacts present ✅"

  # ── Pack ─────────────────────────────────────────────────────────────────
  pack-nuget:
    name: Pack NuGet Package
    runs-on: ubuntu-24.04
    needs: [collect-artifacts]
    timeout-minutes: 15
    steps:
      - name: Checkout with submodules
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Resolve package version
        shell: bash
        run: |
          if [ "$GITHUB_REF_TYPE" == "tag" ]; then
            # Strip the leading 'v' from the tag name (v1.2.3 → 1.2.3)
            VERSION="${GITHUB_REF_NAME#v}"
          else
            # Non-tag builds: read the version from the .csproj and append a pre-release suffix
            CSPROJ_VERSION=$(grep -oP '(?<=<Version>)[^<]+' src/Sharposrm/Sharposrm.csproj)
            VERSION="${CSPROJ_VERSION}-dev.${GITHUB_SHA:0:7}"
          fi
          echo "VERSION=$VERSION" >> "$GITHUB_ENV"
          echo "Resolved package version: $VERSION"

      - name: Download all native artifacts
        uses: actions/download-artifact@v4
        with:
          path: native-libs
          merge-multiple: false

      - name: Organize native libraries by RID
        shell: bash
        run: |
          # download-artifact@v4 creates subdirectories per artifact name.
          # Reorganize from native-libs/sharposrm-{macos|linux}-*/{lib} to native-libs/{rid}/{lib}
          # Note: artifact names use 'macos-' but NuGet RIDs use 'osx-' (dotnet convention).
          # Artifacts now contain the main library + bundled Conan dependencies.
          # Move everything from the per-artifact dirs into the RID-named dirs.
          mkdir -p native-libs/{linux-x64,osx-arm64,win-x64}
          mv native-libs/sharposrm-linux-x64/*   native-libs/linux-x64/
          mv native-libs/sharposrm-macos-arm64/* native-libs/osx-arm64/
          mv native-libs/sharposrm-win-x64/*     native-libs/win-x64/
          rm -rf native-libs/sharposrm-*
          echo "=== Native library layout ==="
          find native-libs -type f | sort

      - name: Pack NuGet package
        shell: bash
        run: |
          dotnet pack src/Sharposrm/Sharposrm.csproj \
            -c Release \
            -p:Version="$VERSION" \
            -p:NativeLibsDir="$(pwd)/native-libs" \
            -o nupkg-output/

      - name: Validate package structure
        shell: bash
        run: |
          NUPKG=$(ls nupkg-output/*.nupkg | head -1)
          if [ -z "$NUPKG" ]; then
            echo "ERROR: no .nupkg found in nupkg-output/"
            ls -R nupkg-output/ || true
            exit 1
          fi
          echo "Found package: $NUPKG"
          echo ""
          echo "=== Package contents ==="
          unzip -l "$NUPKG"
          echo ""
          echo "=== Checking all 3 runtime directories ==="
          for rid in linux-x64 osx-arm64 win-x64; do
            if unzip -l "$NUPKG" | grep -q "runtimes/$rid/native/"; then
              echo "✅ runtimes/$rid/native/ found"
            else
              echo "❌ runtimes/$rid/native/ MISSING"
              exit 1
            fi
          done
          echo ""
          echo "=== Checking metadata files ==="
          for file in LICENSE THIRD-PARTY-NOTICES.txt; do
            if unzip -l "$NUPKG" | grep -q "$file"; then
              echo "✅ $file found"
            else
              echo "❌ $file MISSING"
              exit 1
            fi
          done

      - name: Upload NuGet package
        uses: actions/upload-artifact@v4
        with:
          name: sharposrm-nupkg
          path: nupkg-output/*.nupkg
          retention-days: 7
          if-no-files-found: error

  # ── Integration test ──────────────────────────────────────────────────────
  integration-test:
    name: Integration Test
    runs-on: ubuntu-24.04
    needs: [pack-nuget]
    timeout-minutes: 30
    env:
      DOTNET_CLI_TELEMETRY_OPTOUT: 1
      NUGET_CERT_REVOCATION_MODE: offline
    steps:
      - name: Checkout with submodules
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Download NuGet package
        uses: actions/download-artifact@v4
        with:
          name: sharposrm-nupkg
          path: nupkg-local

      - name: Configure local NuGet source
        shell: bash
        run: |
          dotnet nuget add source "$(pwd)/nupkg-local" \
            --name local-nupkg \
            --store-password-in-clear-text

      - name: Run integration tests
        shell: bash
        run: dotnet test test/Sharposrm.IntegrationTests/ -c Release --logger "console;verbosity=detailed"

  # ── Publish ───────────────────────────────────────────────────────────────
  publish-nuget:
    name: Publish to NuGet.org
    runs-on: ubuntu-24.04
    needs: [integration-test]
    # Only run on version tags — never on branch pushes or PRs
    if: github.ref_type == 'tag'
    environment: release
    timeout-minutes: 10
    steps:
      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Download NuGet package
        uses: actions/download-artifact@v4
        with:
          name: sharposrm-nupkg
          path: nupkg-publish

      - name: Push to NuGet.org
        shell: bash
        run: |
          NUPKG=$(ls nupkg-publish/*.nupkg | head -1)
          echo "Publishing: $NUPKG"
          dotnet nuget push "$NUPKG" \
            --api-key "${{ secrets.NUGET_API_KEY }}" \
            --source https://api.nuget.org/v3/index.json \
            --skip-duplicate
